<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フォームの基本</title>
</head>

<body>
    <form action="/my-handling-form-page" method="post">
        <!--action属性:送り先-->
        <!--method属性:送り方　(getとpost) /get:URLのパラメータで送る post:秘匿して送る-->
        <!--基本は、form要素の中に入っていないとデータとして送ることはできない-->
        <p>
            <!--<p>はブロックレベルなので、縦に並ぶ-->
            <!--ラベルをつける。labelのforとinputのidで紐づける-->
            <!--labelは、inline要素なので、横に並ぶ-->
            <label for="name">Name:</label>
            <!--input要素はデータフィールドで、type属性でデータの種類を分別する-->
            <!--text,number,data,email,tel,passwordなどなど-->
            <!--idは、htmlのルール:同一html内には一つしかない(ユニーク)-->
            <!--nameは、PHPとか受け取る側がデータを判別する属性、複数可-->
            <!--inputは、inline要素なので、横に並ぶ-->
            <input type="text" id="name" name="user_name" />
        </p>
        <p>
            <label for="mail">Email:</label>
            <input type="email" id="mail" name="user_email" />
        </p>
        <p>
            <label for="msg">Message:</label>
            <!--textareaは、改行のある段落を入力するためのテキストエリアです。-->
            <textarea id="msg" name="user_message"></textarea>
        </p>
        <!--データを送信するボタンの種類は３つ-->
        <!--送信ボタンも基本は-->
        <input type="submit" value="送信">
        <button type="submit">送信</button>
        <!--type=imegeも送信ボタンです-->
        <input type="image" src="画像パス" alt="送信ボタン">
    </form>
    <!--formの外-->
    <button>今日の昼食</button>


</body>

</html>
